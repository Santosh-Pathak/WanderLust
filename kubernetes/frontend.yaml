# Frontend — React/Vite (image tag updated by Wanderlust-CD Jenkins pipeline)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: wanderlust
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # CI/CD replaces tag after v1.0.0 — keep image name prefix unchanged for sed in GitOps/Jenkinsfile
          image: YOUR_DOCKERHUB_USER/wanderlust-frontend-beta:v1.0.0
          ports:
            - containerPort: 5173
          readinessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# NodePort 31000 — access at http://<eks-worker-public-ip>:31000
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: wanderlust
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 31000
      protocol: TCP
